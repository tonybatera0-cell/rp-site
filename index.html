<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RP Entretenimento</title>

<style>
body{
margin:0;
font-family:Arial;
background:
radial-gradient(circle at 20% 20%, rgba(0,255,204,0.08), transparent 40%),
radial-gradient(circle at 80% 80%, rgba(0,150,255,0.08), transparent 40%),
linear-gradient(180deg,#020617,#05070f);
color:#fff;
}

header{
background:rgba(15,23,42,0.7);
backdrop-filter:blur(12px);
padding:30px;
text-align:center;
border-bottom:1px solid rgba(0,255,204,0.2);
box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

.logo img{
max-width:220px;
}

.alert{
background:linear-gradient(90deg,#00ffcc,#25D366);
color:#000;
padding:10px;
text-align:center;
font-weight:bold;
border-radius:8px;
margin:10px;
}

.section{
padding:60px 20px;
text-align:center;
}

.btn{
background:linear-gradient(145deg,#00ffcc,#25D366);
color:#000;
padding:16px;
border-radius:12px;
text-decoration:none;
font-weight:bold;
display:inline-block;
margin-top:20px;
}

#popupCompra{
position:fixed;
bottom:90px;
left:20px;
background:#000;
color:#FFD700;
padding:12px;
border-radius:10px;
display:none;
z-index:9999;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.png">
</div>
<p style="color:#00ffcc;font-weight:bold;">🔥 Tudo em um único app pagando menos</p>
</header>

<div class="alert">⏳ Copa do Mundo prestes a começar — garanta seu acesso</div>

<section class="section">
<h2>🏆 Copa do Mundo chegando</h2>
<div id="contador"></div>
<a href="#" class="btn">🔥 QUERO ASSISTIR</a>
</section>

<div id="popupCompra"></div>

<footer style="text-align:center;padding:20px;">
© 2026 RP Entretenimento
</footer>

<script>
const dataCopa = new Date("2026-06-11T15:00:00-03:00").getTime();

function atualizarContador(){
const el = document.getElementById("contador");
const agora = new Date().getTime();
const diff = dataCopa - agora;

const d = Math.floor(diff/(1000*60*60*24));
const h = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const m = Math.floor((diff%(1000*60*60))/(1000*60));
const s = Math.floor((diff%(1000*60))/1000);

el.innerHTML = `${d}d ${h}h ${m}m ${s}s`;
}

setInterval(atualizarContador,1000);

let nomes = ["Carlos","João","Lucas","Pedro","Rafael","Bruno","Felipe","André","Marcos","Ricardo"];

function embaralhar(arr){
for(let i=arr.length-1;i>0;i--){
const j=Math.floor(Math.random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

let fila = embaralhar([...nomes]);
let i=0;

function mostrarCompra(){
const popup=document.getElementById("popupCompra");

if(i>=fila.length){
fila=embaralhar([...nomes]);
i=0;
}

const nome=fila[i++];
popup.innerHTML=`🔥 ${nome} acabou de contratar o plano de R$39,99`;
popup.style.display="block";

setTimeout(()=>popup.style.display="none",4000);
}

setInterval(mostrarCompra,8000);
</script>

</body>
</html>
